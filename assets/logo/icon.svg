<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF8C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B5E2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0A0A0A" stroke="url(#gradient)" stroke-width="4"/>
  <!-- Dumbbell -->
  <rect x="30" y="38" width="40" height="6" rx="3" fill="url(#gradient)"/>
  <rect x="20" y="34" width="10" height="14" rx="3" fill="url(#gradient)"/>
  <rect x="70" y="34" width="10" height="14" rx="3" fill="url(#gradient)"/>
</svg>
