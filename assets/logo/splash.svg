<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF8C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B5E2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="#070709"/>
  <!-- Logo Mark -->
  <circle cx="200" cy="150" r="60" fill="none" stroke="url(#grad)" stroke-width="6"/>
  <rect x="175" y="138" width="50" height="12" rx="4" fill="url(#grad)"/>
  <rect x="160" y="130" width="20" height="20" rx="4" fill="url(#grad)"/>
  <rect x="220" y="130" width="20" height="20" rx="4" fill="url(#grad)"/>
  <!-- App Name -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FFF" text-anchor="middle" dominant-baseline="middle">P.E.K.K.A</text>
  <text x="200" y="330" font-family="Arial, sans-serif" font-size="18" fill="#888" text-anchor="middle">Fitness &amp; Nutrition</text>
</svg>
